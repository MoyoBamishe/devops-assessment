version: '3.9'

services:
  #  Database Setup)
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: always
    environment:
      - POSTGRES_USER=moyo
      - POSTGRES_PASSWORD=moyo_pass
      - POSTGRES_DB=realworld_db
    ports:
      - "5432:5432"

  #  Go API
  backend:
    build: ./backend
    container_name: backend
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      - GIN_MODE=release
      - PORT=8080
      - DATABASE_URL=postgres://moyo:moyo_pass@db:5432/realworld_db?sslmode=disable
    restart: unless-stopped

  # Angular App
  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped